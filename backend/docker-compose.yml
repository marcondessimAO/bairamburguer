version: '3.8'

services:
  db:
    image: postgres:15
    container_name: bairamburguer-db
    restart: always
    environment:
      POSTGRES_USER: bairam_admin
      POSTGRES_PASSWORD: senha_super_segura_aqui
      POSTGRES_DB: bairamburguer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: bairamburguer-api
    restart: always
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/bairamburguer
      SPRING_DATASOURCE_USERNAME: bairam_admin
      SPRING_DATASOURCE_PASSWORD: senha_super_segura_aqui
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN}
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
