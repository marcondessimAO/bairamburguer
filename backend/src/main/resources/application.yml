spring:
  application:
    name: bairamburguer-api
  datasource:
    url: jdbc:postgresql://localhost:5432/bairamburguer
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080
